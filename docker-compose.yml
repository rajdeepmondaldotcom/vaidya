services:
  vaidya:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMADB_HOST: http://chromadb:8000
    depends_on:
      redis:
        condition: service_started
      chromadb:
        condition: service_started
    networks:
      - vaidya-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vaidya-net

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - vaidya-net

volumes:
  redis-data:
  chroma-data:

networks:
  vaidya-net:
