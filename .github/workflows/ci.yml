name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/ eval/ scripts/

      - name: Format check
        run: ruff format --check src/ tests/ eval/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # The [telephony] extra pulls torch via silero and is not needed for the
        # gate: mypy excludes the telephony surface and the telephony tests skip
        # cleanly when pipecat is absent. Keeping it out keeps CI fast.
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check
        run: mypy src/vaidya/

      - name: Tests with coverage
        run: pytest tests/ --cov=src/vaidya --cov-report=term-missing:skip-covered --cov-fail-under=80 -q -p no:logfire
